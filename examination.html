    <script language="javascript" title="dataBase">
      <!--
        const libraryInfoDB=new Dexie("LibraryInfo");
        libraryInfoDB.version(1)
          .stores({main: "name, format, testMethod, TTSvoiceURl, showType"});
        const questionLibraryDB=new Dexie("QuestionLibrary");
        questionLibraryDB.version(1)
          .stores({main: "++_id, _ascription, _proficiency, _lastTest"});
        
        async function getRandomItems(table, ascription, totalLimit, mustHaveIds = []) {
          const guaranteedItems = await table.bulkGet(mustHaveIds);
          let results = guaranteedItems.filter(item => item !== undefined);
          const neededRandomCount = totalLimit - results.length;
          if (neededRandomCount <= 0) {
            return results.slice(0, totalLimit);
          }
          const allMatchIds = await table
            .where('_ascription').equals(ascription)
            .primaryKeys();
          const poolIds = allMatchIds.filter(id => !mustHaveIds.includes(id));
          const shuffledPool = poolIds.sort(() => 0.5 - Math.random());
          const selectedRandomIds = shuffledPool.slice(0, neededRandomCount);
          const randomItems = await table.bulkGet(selectedRandomIds);
          results = results.concat(randomItems);
          shuffle(results);
          return results;
        }
        
        async function getReviewQuestion(){
          clearQuestion();
          if(reviewIDlist.length<1){
            questionShowObj.innerHTML="測驗已結束";
            return;
          }
          const questionID=reviewIDlist.pop();
          const questionInfo=await questionLibraryDB.main.get(+questionID);
          const LibraryInfo=await libraryInfoDB.main.get(questionInfo._ascription);
          let randomNum=Math.random();
          let testMethod=null;
          for(let thisMethod of LibraryInfo.testMethod){ //抽測試方式
            if(randomNum<=thisMethod.probability){
              testMethod=thisMethod;
              break;
            }else{
              randomNum-=thisMethod.probability;
            }
          }
          questionShowObj.innerHTML=questionInfo[testMethod.show];
          questionShowObj.dataset.questionID=+questionID;
          questionShowObj.dataset.questionScore=testMethod.score;
          questionShowObj.dataset.sdoundAfter=testMethod.sdoundAfter;
          questionShowObj.dataset.TTSvoiceURl=LibraryInfo.TTSvoiceURl;
          if(testMethod.show2nd){
            questionShow2ndObj.innerHTML=questionInfo[testMethod.show2nd];
            questionShow2ndObj.style.display="block";
          }
          switch(testMethod.selectType){
            case "random":
              const selectList=await getRandomItems(
                questionLibraryDB.main,
                LibraryInfo.name,
                testMethod.selectNumber,
                [+questionID]
              );
              for(let i of [1,2,3,4]){
                if(i<=testMethod.selectNumber){
                  const obj=document.getElementById(String(i))
                  obj.style.display="block";
                  obj.innerHTML=selectList[i-1][testMethod.select];
                  obj.dataset.fromID=selectList[i-1]._id;
                }
              }
              break;
            case "inQuestion":
              for(let i of [1,2,3,4]){
                if(i<=testMethod.selectNumber){
                  const obj=document.getElementById(String(i))
                  obj.style.display="block";
                  obj.innerHTML=questionInfo[testMethod.select[i-1]];
                  if(questionInfo[testMethod.answer]==i)
                  {obj.dataset.fromID=questionID;}
                  else
                  {obj.dataset.fromID=-1;}
                }
              }
              break;
            case "TorF":
              for(let i of [1,2]){
                const obj=document.getElementById(String(i))
                obj.style.display="block";
                obj.innerHTML=(i-1)?"O":"X";
                if(questionInfo[testMethod.answer]==i)
                {obj.dataset.fromID=questionID;}
                else
                {obj.dataset.fromID=-1;}
              }
              break;
          }
          if(testMethod.soundBefore)
          {speak(questionInfo[testMethod.soundBefore]+".",LibraryInfo.TTSvoiceURl);}
        }
        
        async function selectAnswer(obj){
          const anser=questionShowObj.dataset.questionID;
          const score=questionShowObj.dataset.questionScore;
          const original=await questionLibraryDB.main.get(+anser)
          for(let i of [1,2,3,4]){
            const thisObj=document.getElementById(String(i))
            if(thisObj.dataset.fromID==anser)
            {thisObj.classList.add("correct");}
            thisObj.setAttribute("onclick","");
          };
          if(obj.dataset.fromID==anser){
            await questionLibraryDB.main.update(+anser,{
              _proficiency: original._proficiency*(1+score/100),
              _lastTest: +new Date()
            });
          }else{
            obj.classList.add("wrong");
            await questionLibraryDB.main.update(+anser,{
              _proficiency: Math.round(original._proficiency/(2.5-score/100)),
              _lastTest: +new Date()
            });
          }
          if(questionShowObj.dataset.sdoundAfter)
          {speak(original[questionShowObj.dataset.sdoundAfter]+".",questionShowObj.dataset.TTSvoiceURl);}
        }
